<!DOCTYPE html>
<html>
    <head>
        <title>Perimeter Calculator</title>
    </head>

    <body>
        <script>
            var choice = prompt("Welcome to Perimeter calculator. \n Please Enter Your Choice. \n 1. Perimeter of rectangle \n 2. Perimeter of triangle \n 3. Perimeter of circle. \n 4. Perimeter of parallelogram");
                if (choice == 1) {
                    var l = prompt("Enter the length");
                    var b = prompt("Enter the breadth");
                    var result = 2 * (Number(l) + Number(b));
                    alert("Perimeter of rectangle is " + result);
                }
                else if (choice == 2) {
                    var h = prompt("Enter the height");
                    var b = prompt("Enter the base");
                    var hy = prompt("Enter the hypotenuse");
                    var result = Number(h) + Number(b) + Number(hy);
                    alert("Perimeter of triangle is " + result);
                }
                else if (choice == 3) {
                    var r = prompt("Enter the radius");
                    var result = 2 * 3.14 * Number(r);
                    alert("Perimeter of circle is " + result);
                }
                else if (choice == 4) {
                    var h = prompt("Enter the height");
                    var cb = prompt("Enter the corresponding base");
                    var result = 2 * (Number(cb) + Number(h));
                    alert("Perimeter of parallelogram is " + result);
                }
                else {
                    alert("Invalid choice");
                }
        </script>
    </body>
</html>
